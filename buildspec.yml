version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 22
    commands:
      - npm ci
      - npm install -g aws-cdk
  pre_build:
    commands:
      - echo "Running security scans..."
      - echo "Dependency vulnerability scan..."
      - npm audit --audit-level=high --production --json > npm-audit-report.json || echo "Audit completed with findings"
      - echo "SAST scan with ESLint security rules..."
      - npx eslint src/ --ext .ts --format json --output-file eslint-security-report.json || echo "ESLint security scan completed"
      - echo "Security scans completed successfully"
      - echo "Running tests..."
      - npm test
  build:
    commands:
      - npm run build
      - npm run synth
  post_build:
    commands:
      - echo Build completed on `date`

artifacts:
  files:
    - '**/*'
    - 'npm-audit-report.json'
    - 'eslint-security-report.json'
  name: typescript-lambda-artifacts

reports:
  security-reports:
    files:
      - 'npm-audit-report.json'
      - 'eslint-security-report.json'
    file-format: 'JSON'
  test-reports:
    files:
      - 'coverage/lcov.info'
    file-format: 'LCOV'
  junit-reports:
    files:
      - 'junit.xml'
    file-format: 'JUNITXML'